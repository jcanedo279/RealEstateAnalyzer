
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access to this page has been denied</title>
  <style>
    @import url(https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap);
    body {
      background-color: #fafbfc;
      margin: 0;
      font-family: Roboto, sans-serif;
    }

    /* --- Variant 1: full-page wrapper centers the modal card --- */
    #px-captcha-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2147483646;
    }
    #px-captcha-wrapper .px-captcha-container {
      width: 530px;
      padding: 28px 32px 24px;
    }

    /* --- Variant 2: container centers itself --- */
    .px-captcha-container-v2 {
      position: fixed;
      width: 530px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 28px 32px 24px;
      z-index: 2147483646;
    }

    /* --- Shared modal card styling --- */
    .px-captcha-container,
    .px-captcha-container-v2 {
      background: #fff;
      border-radius: 3px;
      box-shadow: 0 2px 9px -1px rgba(0,0,0,.13);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* V1-only: logo */
    .px-captcha-logo { height: 40px; display: block; }

    /* V2-only: header text */
    .px-captcha-header {
      font-size: 22px;
      font-weight: 500;
      color: #333;
      text-align: center;
    }

    .px-captcha-message {
      font-size: 18px;
      color: #333;
      line-height: 1.4;
      text-align: center;
    }

    /* Interactive button — replicates the real #px-captcha dimensions exactly.
       Real challenge: min-width:253px, rendered height matches the shadow-DOM
       iframe at 52px. Both variants use the same #px-captcha element. */
    #px-captcha {
      display: block;
      min-width: 253px;
      width: 253px;
      height: 52px;
      position: relative;
      cursor: pointer;
      user-select: none;
      border-radius: 4px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .px-btn-progress {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      width: 0%;
      background: rgba(0, 170, 60, 0.35);
      z-index: 1;
      pointer-events: none;
    }
    .px-btn-label {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 500;
      color: #333;
      z-index: 2;
      pointer-events: none;
    }
    .px-captcha-refid {
      font-size: 11px;
      color: #b1b5b8;
      text-align: center;
    }

    /* Variant switcher */
    #variant-bar {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .vbtn {
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid #bbb;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .vbtn.active {
      background: #1976d2;
      color: #fff;
      border-color: #1976d2;
    }
    #variant-label {
      font-size: 11px;
      color: #888;
    }

    /* Results overlay */
    #test-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(10, 12, 14, 0.88);
      color: #00ee66;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 11px;
      padding: 12px 14px;
      border-radius: 8px;
      max-width: 400px;
      white-space: pre;
      z-index: 9999;
      pointer-events: none;
      line-height: 1.45;
    }
  </style>
</head>
<body>

  <!-- PX globals — same keys the real challenge sets.
       _dom_source_matches checks window._pxUuid / _pxAppId / _pxVid. -->
  <script>
    window._pxVid    = 'test-vid-aaaa-bbbb-cccc-dddddddddddd';
    window._pxUuid   = 'test-uuid-1111-2222-3333-444444444444';
    window._pxAppId  = 'PXHYx10rg3';
    window._pxMobile = false;
  </script>

  <!-- Mount point — content is replaced by renderVariant() -->
  <div id="captcha-mount"></div>

  <!-- Variant switcher bar -->
  <div id="variant-bar">
    <button class="vbtn" id="btn-v1" onclick="renderVariant(1)">V1</button>
    <button class="vbtn active" id="btn-v2" onclick="renderVariant(2)">V2</button>
    <span id="variant-label">Variant 2 — no wrapper</span>
  </div>

  <!-- Test-results overlay -->
  <div id="test-panel">Waiting for interaction…</div>

  <script>
    // ---------------------------------------------------------------
    // Variant HTML templates
    // Both variants share the same #px-captcha inner markup; only the
    // outer container structure differs.
    //
    // Variant 1 (with #px-captcha-wrapper):
    //   #px-captcha-wrapper > .px-captcha-container > [logo img] + #px-captcha
    //
    // Variant 2 (no wrapper — alternate layout seen on Zillow):
    //   .px-captcha-container-v2 > [.px-captcha-header text] + #px-captcha
    // ---------------------------------------------------------------

    var REFID = 'test-uuid-1111-2222-3333-444444444444';

    var CAPTCHA_BUTTON = [
      '<div id="px-captcha">',
      '  <div class="px-btn-progress" id="px-progress"></div>',
      '  <div class="px-btn-label"   id="px-label">Press &amp; Hold</div>',
      '</div>',
    ].join('\n');

    var VARIANT_HTML = {
      1: [
        '<div id="px-captcha-wrapper" dir="auto">',
        '  <div class="px-captcha-container">',
        '    <img class="px-captcha-logo" height="40"',
        '         src="https://www.zillowstatic.com/s3/pfs/static/z-logo-default.svg"',
        '         alt="Logo" onerror="this.style.display=\'none\'">',
        '    <div class="px-captcha-message">',
        '      Press &amp; Hold to confirm you are<br>a human (and not a bot).',
        '    </div>',
        CAPTCHA_BUTTON,
        '    <div class="px-captcha-refid">Reference ID ' + REFID + '</div>',
        '  </div>',
        '</div>',
      ].join('\n'),

      2: [
        '<div class="px-captcha-container px-captcha-container-v2">',
        '  <div class="px-captcha-header">Before we continue...</div>',
        '  <div class="px-captcha-message">',
        '    Press &amp; Hold to confirm you are<br>a human (and not a bot).',
        '  </div>',
        CAPTCHA_BUTTON,
        '  <div class="px-captcha-refid">Reference ID ' + REFID + '</div>',
        '</div>',
      ].join('\n'),
    };

    // ---------------------------------------------------------------
    // Event tracking
    // ---------------------------------------------------------------
    var HOLD_THRESHOLD_MS = 3000;
    var _holdStart  = null;
    var _pressX     = null;
    var _pressY     = null;
    var _rafId      = null;

    window._testResults = buildFreshResults();

    function buildFreshResults() {
      return {
        variant:             null,
        events_received:     [],
        pointerdown_coords:  null,
        hold_duration_ms:    null,
        hold_passed:         false,
        approach_moves:      0,
        jitter_moves:        0,
        max_jitter_px:       0,
        cleared:             false,
      };
    }

    function resetResults(variant) {
      _holdStart = null; _pressX = null; _pressY = null;
      if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
      var R = buildFreshResults();
      R.variant = variant;
      window._testResults = R;
      renderPanel();
    }

    function renderPanel() {
      document.getElementById('test-panel').textContent = JSON.stringify(window._testResults, null, 2);
    }

    function onDown(x, y) {
      if (_holdStart !== null) return;
      _holdStart = performance.now();
      _pressX = x; _pressY = y;
      var R = window._testResults;
      R.events_received.push('down');
      R.pointerdown_coords = { x: Math.round(x), y: Math.round(y) };

      var progress = document.getElementById('px-progress');
      var label    = document.getElementById('px-label');
      _rafId = requestAnimationFrame(function tick() {
        if (_holdStart === null) return;
        var pct = Math.min(100, (performance.now() - _holdStart) / HOLD_THRESHOLD_MS * 100);
        if (progress) progress.style.width = pct + '%';
        if (label) label.textContent = ((performance.now() - _holdStart) / 1000).toFixed(2) + 's';
        _rafId = requestAnimationFrame(tick);
      });
    }

    function onUp(x, y) {
      if (_holdStart === null) return;
      var dur = performance.now() - _holdStart;
      _holdStart = null;
      if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }

      var R = window._testResults;
      R.events_received.push('up');
      R.hold_duration_ms = Math.round(dur);
      R.hold_passed      = dur >= HOLD_THRESHOLD_MS;
      R.cleared          = R.hold_passed;

      var progress = document.getElementById('px-progress');
      var label    = document.getElementById('px-label');
      if (progress) {
        progress.style.width = '100%';
        progress.style.background = R.hold_passed
          ? 'rgba(0, 180, 0, 0.5)'
          : 'rgba(220, 60, 0, 0.35)';
      }
      if (label) {
        label.textContent = R.hold_passed
          ? '✓  ' + Math.round(dur) + ' ms — PASS'
          : '✗  ' + Math.round(dur) + ' ms  (need ' + HOLD_THRESHOLD_MS + ')';
        label.style.color = R.hold_passed ? '#006600' : '#bb2200';
      }
      renderPanel();
    }

    function onMove(x, y) {
      var R = window._testResults;
      if (_holdStart === null) {
        R.approach_moves++;
      } else {
        R.jitter_moves++;
        if (_pressX !== null) {
          var dx = x - _pressX, dy = y - _pressY;
          var dist = Math.round(Math.sqrt(dx*dx + dy*dy) * 10) / 10;
          if (dist > R.max_jitter_px) R.max_jitter_px = dist;
        }
      }
    }

    // Document-level listeners — survive variant swaps (delegated to #px-captcha).
    document.addEventListener('pointerdown', function(e) {
      if (e.target.closest('#px-captcha')) onDown(e.clientX, e.clientY);
    }, true);
    document.addEventListener('pointerup', function(e) {
      if (_holdStart !== null) onUp(e.clientX, e.clientY);
    }, true);
    document.addEventListener('mousedown', function(e) {
      if (e.target.closest('#px-captcha') && !window._testResults.events_received.includes('down')) {
        onDown(e.clientX, e.clientY);
      }
    }, true);
    document.addEventListener('mouseup', function(e) {
      if (_holdStart !== null) onUp(e.clientX, e.clientY);
    }, true);
    document.addEventListener('mousemove',   function(e) { onMove(e.clientX, e.clientY); });
    document.addEventListener('pointermove', function(e) { onMove(e.clientX, e.clientY); });

    // ---------------------------------------------------------------
    // Variant rendering
    // ---------------------------------------------------------------
    function renderVariant(v) {
      document.getElementById('captcha-mount').innerHTML = VARIANT_HTML[v];
      document.getElementById('btn-v1').classList.toggle('active', v === 1);
      document.getElementById('btn-v2').classList.toggle('active', v === 2);
      document.getElementById('variant-label').textContent = v === 1
        ? 'Variant 1 — #px-captcha-wrapper + logo'
        : 'Variant 2 — .px-captcha-container direct (no wrapper)';
      resetResults(v);
    }

    // Default: Variant 2 (the alternate layout the user flagged)
    renderVariant(2);
  </script>

</body>
</html>
